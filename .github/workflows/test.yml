name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Frontend + Backend + E2E (PostgreSQL efímero)
    runs-on: ubuntu-latest

    # PostgreSQL efímero — se crea y destruye con el job, sin depender de Neon
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rockmerch_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d rockmerch_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm ci
        working-directory: server
        name: Install server dependencies

      - run: npm test -- --reporter=verbose
        name: Frontend unit tests (Vitest)

      - run: npm run test:server -- --reporter=verbose
        name: Backend tests (PostgreSQL real)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/rockmerch_test
          CI: true

      - run: npx playwright install --with-deps chromium
        name: Install Playwright browsers

      - run: npm run test:e2e
        name: E2E tests (Playwright)
        env:
          CI: true
